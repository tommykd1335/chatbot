<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tommy Dev Studio - CRM Bot Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .card-lead { transition: transform 0.2s; }
        .card-lead:hover { transform: scale(1.01); }
        .badge-Caliente { background-color: #dc3545; }
        .badge-Medio { background-color: #ffc107; color: black; }
        .badge-Frío { background-color: #0dcaf0; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🚀 Tommy Dev Studio AI Lead Control</span>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-12">
                <div class="card border-warning">
                    <div class="card-header bg-warning text-dark">⚠️ Recordatorios de Seguimiento (Acción Requerida)</div>
                    <div class="card-body">
                        <ul id="reminder-list" class="list-group list-group-flush">
                            </ul>
                    </div>
                </div>
            </div>
        </div>

        <h2 class="mb-3">Leads Registrados de WhatsApp</h2>
        <div class="row" id="leads-container">
            </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
